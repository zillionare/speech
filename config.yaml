# TTS Web Service 默认配置

# 模型配置
model:
  # 默认模型名称
  name: "mlx-community/VibeVoice-Realtime-0.5B-4bit"
  # 模型缓存目录
  cache_dir: "~/.cache/tts_models"
  # 默认推理步数
  num_steps: 10
  # CFG scale
  cfg_scale: 1.3

# 声音样本配置
samples:
  # 声音样本目录 (包含 {speaker}.wav 文件)
  # 设置为空或未配置时，将自动在以下路径查找：
  # 1. ~/.config/tts-service/voices/
  # 2. ~/.tts-service/voices/
  # 3. 使用 VibeVoice 模型内置的 voices（en-Emma_woman 等）
  base_dir: ""
  # 可选：限定允许的声音列表 (为空则自动扫描所有 .wav 文件)
  # allowed_speakers: ["zh-Aaron_man", "en-Alice_woman"]
  allowed_speakers: []

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8123
  # 工作进程数 (1 为单进程，适合模型加载场景)
  workers: 1
  # 日志级别
  log_level: "info"

# 默认生成参数
defaults:
  # 默认声音
  voice: "zh-Aaron_man"
  # 输出格式: wav, mp3, flac
  response_format: "wav"
  # 语速倍率 (可选，视模型支持)
  speed: 1.0

# PID 文件路径 (用于 CLI 管理服务)
pid_file: "/tmp/tts_service.pid"
