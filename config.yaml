model:
  model_id: "gafiatulin/vibevoice-1.5b-mlx"
  quantize_bits: 8
  diffusion_steps: 10
  cfg_scale: 1.3
  max_speech_tokens: 200
  seed: 42
  use_semantic: true
  use_coreml_semantic: false

voices:
  base_dir: "./voices"
  default_voice: "zh-Bowen_man"
  cache_subdir: ".cache"

outputs:
  base_dir: "./outputs"
  history_limit: 20

server:
  host: "0.0.0.0"
  port: 8123
  log_level: "info"

pid_file: "/tmp/tts_service.pid"
